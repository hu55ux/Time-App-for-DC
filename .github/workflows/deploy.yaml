name: CI/CD for time-app deployment

on:
  push:
    branches: ["main"]
  
  workflow_dispatch:
  
env:
  REGISTRY: gchr.io
  IMAGE_NAME: ${{github.repository}}

jobs:
  test:
    if: github.event_name == 'push'
    strategy:
      matrix:
        node-version: ["24.15.0"]
        os: [ubuntu-latest]
    
    runs-on: ${{matrix.os}}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node-version}}

      - name: Install API Dependencies
        working-directory: ./api
        run: npm install

      - name: Run API Unit test
        working-directory: ./api
        run: npm run test

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install
    
  images-build-and-push:
    if: github.event_name == 'push'
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest]
    
    runs-on: ${{matrix.os}}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      
      - name: Docker login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: API image build and push to docker-hub
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_api ./api
          docker push ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_api

      - name: API image build and push to docker-hub
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_front ./frontend
          docker push ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_front

  aws_vm_deploy:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        os: [ubuntu-latest]
      
    runs-on: ${{matrix.os}}

    steps:
      - name: AWS ec2 VM deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.AWS_HOST}}
          username: ${{secrets.AWS_USERNAME}}
          key: ${{secrets.AWS_SSH_SECRET_KEY}}
          port: 22

          script: |
            if [ ! -d "time-app-for-deploy-FSDM_Oct_24_4_az/.git" ]; then
            git clone https://github.com/Zamanof/time-app-for-deploy-FSDM_Oct_24_4_az.git
            fi

            cd time-app-for-deploy-FSDM_Oct_24_4_az
            git pull origin main
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f


    
     