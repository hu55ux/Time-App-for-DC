name: CI/CD for time-app deployment

on:
  push:
    branches: ["main"]

jobs:
  test:
    strategy:
      matrix:
        node-version: ["24.15.0"]
        os: [ubuntu-latest]
    
    runs-on: ${{matrix.os}}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node-version}}

      - name: Install API Dependencies
        working-directory: ./api
        run: npm install

      - name: Run API Unit test
        working-directory: ./api
        run: npm run test

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install
    
  build-and-deploy:
    strategy:
      matrix:
        node-version: ["24.15.0"]
        os: [ubuntu-latest]
    
    runs-on: ${{matrix.os}}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      
      - name: Docker login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: API image build and push to docker-hub
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_api ./api
          docker push ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_api

      - name: API image build and push to docker-hub
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_front ./frontend
          docker push ${{secrets.DOCKER_USERNAME}}/time_app_fsdm_oct_24_4_az_front